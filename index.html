<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Final Exams 🦋</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;700;900&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* ثيم الطبيعة والفراشة */
      --bg-fallback:#2d3a2e;
      --surface:   rgba(250, 248, 245, 0.88);
      --bg2:       rgba(235, 232, 222, 0.85);
      --border:    #a3b19b;
      --border2:   #d97736;
      --primary:   #d97736;
      --primary2:  #2d4a32;
      --soft:      #b88a5c;
      --theme-lt:  rgba(217, 119, 54, 0.12);
      --green:     #1b5e20;
      --green-lt:  rgba(200, 230, 201, 0.8);
      --text:      #2b221e;
      --muted:     #5c6b5d;
      --muted2:    #7a877b;
      --white:     #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-fallback);
      background-image: url('1000029994.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Cairo', sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding: 48px 20px 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ════ HEADER ════ */
    header {
      text-align: center;
      margin-bottom: 45px;
      animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
      /* تمت إزالة الخلفية والإطار من هنا بناءً على طلبك */
      padding: 10px;
    }

    .butterfly-row {
      font-size: 2.8rem;
      margin-bottom: 5px;
      display: flex;
      justify-content: center;
      gap: 12px;
      /* ظل للفراشات لتبرز على الخلفية */
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    .butterfly {
      display: inline-block;
      cursor: pointer;
      animation: float 3s ease-in-out infinite;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      user-select: none;
    }

    .butterfly:hover {
      transform: scale(1.4) rotate(15deg) translateY(-10px) !important;
      animation-play-state: paused;
    }

    .butterfly:active {
      transform: scale(0.9) rotate(-15deg) !important;
      transition: transform 0.1s;
    }

    h1 {
      /* تغيير الخط إلى Poppins ليكون أنيقاً وعصرياً */
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: clamp(2.8rem, 6vw, 4.2rem); /* تكبير الخط قليلاً */
      color: #fcf9f2; /* لون كريمي فاتح ليبرز فوق الصورة */
      line-height: 1.2;
      /* ظل ناعم للنص ليجعله مقروءاً بوضوح بدون إطار */
      text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(217, 119, 54, 0.3);
      margin-bottom: 15px;
      direction: ltr;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 1.05rem;
      color: var(--text);
      font-weight: 800;
      background: rgba(250, 248, 245, 0.9);
      backdrop-filter: blur(5px);
      display: inline-block;
      padding: 8px 24px;
      border-radius: 30px;
      margin-top: 6px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* ════ STATS ROW ════ */
    .stats-row {
      display: flex;
      gap: 14px;
      margin-bottom: 36px;
      flex-wrap: wrap;
      justify-content: center;
      animation: slideUp .5s .15s ease both;
    }

    .stat-box {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 16px;
      padding: 14px 22px;
      text-align: center;
      min-width: 90px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .stat-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .stat-box .num {
      font-family: 'Tajawal', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .stat-box .lbl {
      font-size: .8rem;
      color: var(--primary2);
      font-weight: 800;
      margin-top: 4px;
    }

    /* ════ COUNTDOWN ════ */
    .countdown-wrap {
      background: linear-gradient(135deg, rgba(45, 74, 50, 0.85) 0%, rgba(184, 138, 92, 0.85) 100%);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 18px;
      padding: 20px 28px;
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
      animation: slideUp .5s .22s ease both;
      max-width: 550px;
      width: 100%;
      min-height: 85px;
    }

    .cd-label {
      color: rgba(255,255,255,.95);
      font-weight: 900;
      font-size: 1rem;
      white-space: nowrap;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    .cd-units {
      display: flex;
      gap: 10px;
    }

    .cd-unit {
      background: rgba(255,255,255,.15);
      border-radius: 12px;
      padding: 8px 14px;
      text-align: center;
      min-width: 65px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: inset 0 2px 4px rgba(255,255,255,0.1);
    }

    .cd-unit .n {
      font-family: 'Tajawal', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
    }

    .cd-unit .u {
      font-size: .7rem;
      color: rgba(255,255,255,.9);
      margin-top: 3px;
      font-weight: 600;
    }

    #cd-finished {
      display: none;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 900;
      text-align: center;
      width: 100%;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    #cd-content {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    /* ════ TABLE CARD ════ */
    .table-card {
      width: 100%;
      max-width: 860px;
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 3px 0 var(--border2),
        0 12px 40px rgba(0, 0, 0, 0.15),
        0 4px 12px rgba(0, 0, 0, 0.1);
      animation: slideUp .55s .28s ease both;
    }

    .table-top-strip {
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--primary2) 0px, var(--primary2) 20px,
        var(--primary) 20px, var(--primary) 40px,
        var(--soft) 40px, var(--soft) 60px
      );
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--bg2);
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 16px 22px;
      font-family: 'Tajawal', sans-serif;
      font-weight: 900;
      font-size: .9rem;
      letter-spacing: .05em;
      color: var(--primary2);
      text-align: right;
    }

    th:first-child { text-align: center; width: 60px; }
    th:last-child { text-align: center; width: 80px; }

    tbody tr {
      border-bottom: 1px solid rgba(163, 177, 155, 0.4);
      transition: background .3s;
      animation: rowFade .4s ease both;
    }

    tbody tr:nth-child(1) { animation-delay: .32s; }
    tbody tr:nth-child(2) { animation-delay: .39s; }
    tbody tr:nth-child(3) { animation-delay: .46s; }
    tbody tr:nth-child(4) { animation-delay: .53s; }
    tbody tr:nth-child(5) { animation-delay: .60s; }
    tbody tr:nth-child(6) { animation-delay: .67s; }
    tbody tr:nth-child(7) { animation-delay: .74s; }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: rgba(255, 255, 255, 0.5); }

    td {
      padding: 18px 22px;
      font-size: .95rem;
      vertical-align: middle;
    }

    /* number */
    .num-cell { text-align: center; }

    .num-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      border: 1.5px solid var(--border);
      color: var(--primary2);
      font-weight: 900;
      font-size: .9rem;
    }

    /* day */
    .day-cell { font-weight: 800; color: var(--text); }

    /* date chip */
    .date-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: .85rem;
      color: var(--primary2);
      font-weight: 800;
    }

    /* subject */
    .subject-cell {
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--primary2);
    }

    /* ── checkbox ── */
    .check-cell {
      text-align: center;
    }

    .custom-checkbox {
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: var(--primary);
      transition: transform 0.2s;
    }
    .custom-checkbox:hover {
      transform: scale(1.2);
    }

    /* ── next exam ── */
    tbody tr.next-exam {
      background: linear-gradient(90deg, rgba(217, 119, 54, 0.15), rgba(45, 74, 50, 0.05));
      position: relative;
    }

    tbody tr.next-exam::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      background: var(--primary);
      border-radius: 4px 0 0 4px;
    }

    .next-badge {
      display: inline-block;
      font-size: .7rem;
      font-weight: 900;
      color: #fff;
      background: var(--primary);
      border-radius: 6px;
      padding: 3px 10px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: .05em;
      box-shadow: 0 2px 6px rgba(217, 119, 54, 0.4);
    }

    /* ── done rows ── */
    tbody tr.done td { color: var(--muted2); }
    tbody tr.done .subject-cell {
      text-decoration: line-through;
      text-decoration-color: var(--border2);
      text-decoration-thickness: 2px;
      color: var(--muted2);
    }
    tbody tr.done .num-badge {
      background: var(--green-lt);
      border-color: #81c784;
      color: var(--green);
    }

    .check-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--green-lt);
      color: var(--green);
      font-size: .8rem;
      margin-left: 7px;
      vertical-align: middle;
      flex-shrink: 0;
      border: 1px solid #a5d6a7;
    }

    /* ════ FOOTER ════ */
    .footer {
      margin-top: 30px;
      text-align: center;
      color: #ffffff;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
      font-size: 1rem;
      font-weight: 800;
      animation: slideUp .5s .8s ease both;
      opacity: 0;
      animation-fill-mode: forwards;
      background: rgba(45, 74, 50, 0.6);
      padding: 8px 20px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }

    .footer span { color: #ffd180; font-weight: 900; }

    /* ════ ANIMATIONS ════ */
    @keyframes popIn {
      from { opacity: 0; transform: scale(.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes rowFade {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50%      { transform: translateY(-8px) rotate(3deg); }
    }

@media (max-width: 580px) {
      header { padding: 5px; margin-bottom: 20px;}
      h1 { font-size: 1.8rem; }
      
      /* إبقاء ميزة السحب الأفقي للجدول حتى ما ينقص أي جزء */
      .table-card { overflow-x: auto; border-radius: 16px; }
      table { width: 100%; min-width: 340px; }
      
      /* تقليل المسافات لأقصى حد حتى تكفي الشاشة */
      th, td { padding: 8px 3px; font-size: 0.8rem; }
      
      /* تصغير دوائر الأرقام بس تبقى موجودة وحلوة */
      .num-badge { width: 22px; height: 22px; font-size: 0.75rem; }
      
      .subject-cell { font-size: 0.85rem; }
      .day-cell { font-size: 0.8rem; }
      
      /* تصغير التاريخ */
      .date-chip { font-size: 0.65rem; padding: 3px 5px; gap: 3px; }
      .date-chip svg { width: 10px; height: 10px; }
      
      /* تصغير مربع الصح والشارات */
      .custom-checkbox { width: 18px; height: 18px; }
      .next-badge { font-size: 0.55rem; padding: 2px 4px; margin-left: 3px;}
      .check-icon { width: 16px; height: 16px; font-size: 0.6rem; margin-left: 4px; }
      
      /* تصغير العداد */
      .countdown-wrap { padding: 12px 10px; gap: 6px; }
      .cd-unit { min-width: 45px; padding: 6px 4px; }
      .cd-unit .n { font-size: 1.1rem; }
      .cd-unit .u { font-size: 0.6rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="butterfly-row">
      <span class="butterfly" style="animation-delay: 0s;">🦋</span>
      <span class="butterfly" style="animation-delay: 0.3s;">✨</span>
      <span class="butterfly" style="animation-delay: 0.6s;">🦋</span>
    </div>
    <h1>Final Exams Schedule</h1>
    <div class="subtitle">الكورس الثاني برعاية: سخت براحتك  🦋</div>
  </header>

  <div class="stats-row" id="stats-row">
    <div class="stat-box"><div class="num" id="stat-total">--</div><div class="lbl">مجموع</div></div>
    <div class="stat-box"><div class="num" id="stat-rem">--</div><div class="lbl">باقي</div></div>
    <div class="stat-box"><div class="num" id="stat-done">--</div><div class="lbl">منتهي</div></div>
  </div>

  <div class="countdown-wrap">
    <div id="cd-content">
      <div class="cd-label" id="cd-lbl">⏳باقي عالامتحان</div>
      <div class="cd-units">
        <div class="cd-unit"><div class="n" id="cd-d">--</div><div class="u">يوم</div></div>
        <div class="cd-unit"><div class="n" id="cd-h">--</div><div class="u">ساعة</div></div>
        <div class="cd-unit"><div class="n" id="cd-m">--</div><div class="u">دقيقة</div></div>
        <div class="cd-unit"><div class="n" id="cd-s">--</div><div class="u">ثانية</div></div>
      </div>
    </div>
    <div id="cd-finished">
      🎉انتهت جميع الامتحانات، مبروك يا فاشل :)! 🦋✨
    </div>
  </div>

  <div class="table-card">
    <div class="table-top-strip"></div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>اليوم</th>
          <th>التاريخ</th>
          <th>المادة</th>
          <th>تم؟</th>
        </tr>
      </thead>
      <tbody id="exam-body"></tbody>
    </table>
  </div>

  <div class="footer">وقت الامتحانات <span>9:00 صباحاً</span> —  حنرسب بكل الاحوال  🦋💪</div>

 <script>
    const exams = [
      { day: 'الاثنين',    date: '2026-05-11', subject: 'خوارزميات البحث' },
      { day: 'الأربعاء',   date: '2026-05-13', subject: 'قواعد بيانات' },
      { day: 'الاثنين',    date: '2026-05-18', subject: 'اللغة العربية' },
      { day: 'الأربعاء',   date: '2026-05-20', subject: 'المعالجة المايكروية' },
      { day: 'السبت',      date: '2026-05-23', subject: 'المنطق المضبب' },
      { day: 'الثلاثاء',   date: '2026-06-02', subject: 'اللغة الانكليزية' },
      { day: 'الخميس',     date: '2026-06-04', subject: 'طرق البحث الموجهة' }
    ];

    // استرجاع حالة الامتحانات المحفوظة من المتصفح
    let completedState = JSON.parse(localStorage.getItem('examsState')) || Array(exams.length).fill(false);
    
    // ----------------------------------------------------
    // التعديل الجديد: التحديث التلقائي للامتحانات المنتهية
    const now = new Date();
    let stateChanged = false;

    exams.forEach((exam, i) => {
      const examEndTime = new Date(exam.date);
      // حددنا وقت النهاية الساعة 12 ظهراً (بما إن الامتحان يبدأ 9 صباحاً)
      examEndTime.setHours(12, 0, 0, 0); 

      // إذا الوقت الحالي عبر وقت نهاية الامتحان، وما كان مأشر صح
      if (now > examEndTime && !completedState[i]) {
        completedState[i] = true; // خلي صح تلقائياً
        stateChanged = true;
      }
    });

    // إذا صار أي تحديث تلقائي، نحفظه بالذاكرة حتى ما يضيع
    if (stateChanged) {
      localStorage.setItem('examsState', JSON.stringify(completedState));
    }
    // ----------------------------------------------------

    let nextIdx = -1;

    function renderTable() {
      const tbody = document.getElementById('exam-body');
      tbody.innerHTML = '';
      
      let doneCount = 0;
      nextIdx = -1;

      exams.forEach((exam, i) => {
        const isPassed = completedState[i];
        if (isPassed) doneCount++;

        // المادة القادمة هي أول مادة لم يتم وضع صح عليها
        const isNext = !isPassed && nextIdx === -1;
        if (isNext) nextIdx = i;

        const d = new Date(exam.date);
        const fmt = d.toLocaleDateString('ar-IQ', { day:'numeric', month:'long', year:'numeric' });

        const tr = document.createElement('tr');
        if (isPassed) tr.classList.add('done');
        if (isNext)   tr.classList.add('next-exam');

        const dayContent = isPassed
          ? `<span class="check-icon">✔</span>${exam.day}`
          : isNext
            ? `${exam.day}<span class="next-badge">اللي حترسب بيه</span>`
            : exam.day;

        tr.innerHTML = `
          <td class="num-cell"><span class="num-badge">${i+1}</span></td>
          <td class="day-cell">${dayContent}</td>
          <td>
            <span class="date-chip">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="4" width="18" height="18" rx="3"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              ${fmt}
            </span>
          </td>
          <td class="subject-cell">${exam.subject}</td>
          <td class="check-cell">
            <input type="checkbox" class="custom-checkbox" onchange="toggleExam(${i})" ${isPassed ? 'checked' : ''}>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // تحديث الإحصائيات
      document.getElementById('stat-total').textContent = exams.length;
      document.getElementById('stat-rem').textContent = exams.length - doneCount;
      document.getElementById('stat-done').textContent = doneCount;

      tick();
    }

    // دالة لتغيير حالة الامتحان يدوياً (في حال ردتي تغيرين شي)
    window.toggleExam = function(index) {
      completedState[index] = !completedState[index];
      localStorage.setItem('examsState', JSON.stringify(completedState));
      renderTable();
    };

    // العداد التنازلي
    function tick() {
      const content = document.getElementById('cd-content');
      const finishedMsg = document.getElementById('cd-finished');

      if (nextIdx === -1) {
        content.style.display = 'none';
        finishedMsg.style.display = 'block';
        return;
      } else {
        content.style.display = 'flex';
        finishedMsg.style.display = 'none';
      }

      const target = new Date(exams[nextIdx].date);
      target.setHours(9,0,0,0); // وقت الامتحان 9 صباحاً
      const diff = target - new Date();

      if (diff <= 0) {
        document.getElementById('cd-d').textContent = '00';
        document.getElementById('cd-h').textContent = '00';
        document.getElementById('cd-m').textContent = '00';
        document.getElementById('cd-s').textContent = '00';
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);

      document.getElementById('cd-d').textContent = String(d).padStart(2,'0');
      document.getElementById('cd-h').textContent = String(h).padStart(2,'0');
      document.getElementById('cd-m').textContent = String(m).padStart(2,'0');
      document.getElementById('cd-s').textContent = String(s).padStart(2,'0');
    }

    renderTable();
    setInterval(tick, 1000);
  </script>
</body>
</html>
